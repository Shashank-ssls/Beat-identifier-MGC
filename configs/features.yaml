# Feature extraction config (Phase 2).
# Two independent pipelines feed the two benchmark paths.

# ── (A) Classic-ML features → one vector per clip → StandardScaler → XGB/SVM ──
classic:
  n_mfcc: 20                   # number of MFCC coefficients
  # For each feature group we take mean + std over time → fixed-length vector.
  include:
    mfcc: true
    chroma: true
    spectral_contrast: true
    zero_crossing_rate: true
    spectral_rolloff: true
    tempo: true
  cache_path: features_cache/classic_features.parquet

# ── (B) Mel-spectrogram tensors → small CNN ──────────────────────────────────
melspec:
  n_mels: 128                  # mel bands (plan-mandated)
  n_fft: 2048
  hop_length: 512
  fmin: 0
  fmax: null                   # null → sr/2 (Nyquist)
  to_db: true                  # convert power spectrogram to dB scale
  normalize: true              # per-spectrogram standardization
  cache_path: features_cache/melspecs   # one tensor file per clip
