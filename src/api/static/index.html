<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beat Identifier</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-2: #273449;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent-2: #818cf8;
      --ok: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(1200px 600px at 50% -10%, #1e293b, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
      overflow: hidden;
    }
    .titlebar {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .titlebar h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .2px; }
    .titlebar .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    .titlebar .dot.live { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
    .titlebar .model { margin-left: auto; font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }

    /* ── upper div: input ── */
    .input {
      padding: 22px;
      border-bottom: 1px solid var(--line);
    }
    .drop {
      border: 1.5px dashed var(--line);
      border-radius: 12px;
      padding: 26px 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      background: var(--card-2);
    }
    .drop:hover, .drop.hover { border-color: var(--accent-2); background: #2b3a52; }
    .drop .icon { font-size: 30px; }
    .drop .big { margin-top: 8px; font-size: 14px; font-weight: 600; }
    .drop .small { margin-top: 4px; font-size: 12px; color: var(--muted); }
    .filename { margin-top: 12px; font-size: 12px; color: var(--accent-2); word-break: break-all; }
    .btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .05s;
    }
    .btn:hover { opacity: .92; }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── lower div: output ── */
    .output { padding: 22px; min-height: 120px; }
    .placeholder { color: var(--muted); font-size: 13px; text-align: center; padding: 18px 0; }
    .genre { font-size: 30px; font-weight: 700; text-transform: capitalize; }
    .genre.uncertain { color: var(--warn); }
    .confline { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .bars { margin-top: 18px; display: flex; flex-direction: column; gap: 9px; }
    .bar-row { display: grid; grid-template-columns: 74px 1fr 42px; align-items: center; gap: 10px; font-size: 12px; }
    .bar-row .name { color: var(--muted); text-transform: capitalize; }
    .bar-track { height: 8px; background: var(--card-2); border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .5s ease; }
    .bar-row.top .bar-fill { background: linear-gradient(90deg, var(--ok), #4ade80); }
    .bar-row .pct { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
    .error { color: #f87171; font-size: 13px; text-align: center; padding: 18px 0; }
    .spinner {
      width: 22px; height: 22px; margin: 22px auto; border-radius: 50%;
      border: 3px solid var(--line); border-top-color: var(--accent-2);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="titlebar">
      <span class="dot" id="dot"></span>
      <h1>Beat Identifier</h1>
      <span class="model" id="model">…</span>
    </div>

    <!-- upper div: input -->
    <div class="input">
      <div class="drop" id="drop">
        <div class="icon">🎵</div>
        <div class="big">Drop an audio clip here</div>
        <div class="small">or click to browse — .wav / .mp3 / .flac</div>
        <div class="filename" id="filename"></div>
      </div>
      <input type="file" id="file" accept="audio/*" hidden />
      <button class="btn" id="go" disabled>Classify</button>
    </div>

    <!-- lower div: output -->
    <div class="output" id="output">
      <div class="placeholder">Results will appear here.</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("file");
    const drop = document.getElementById("drop");
    const fnEl = document.getElementById("filename");
    const goBtn = document.getElementById("go");
    const output = document.getElementById("output");
    let chosen = null;

    // health → show which model is loaded
    fetch("/health").then(r => r.json()).then(h => {
      document.getElementById("model").textContent = h.model || "no model";
      if (h.status === "ok") document.getElementById("dot").classList.add("live");
    }).catch(() => {});

    drop.addEventListener("click", () => fileInput.click());
    ["dragover", "dragenter"].forEach(e => drop.addEventListener(e, ev => {
      ev.preventDefault(); drop.classList.add("hover");
    }));
    ["dragleave", "drop"].forEach(e => drop.addEventListener(e, ev => {
      ev.preventDefault(); drop.classList.remove("hover");
    }));
    drop.addEventListener("drop", ev => { if (ev.dataTransfer.files[0]) setFile(ev.dataTransfer.files[0]); });
    fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

    function setFile(f) {
      chosen = f;
      fnEl.textContent = f.name;
      goBtn.disabled = false;
    }

    goBtn.addEventListener("click", async () => {
      if (!chosen) return;
      goBtn.disabled = true;
      output.innerHTML = '<div class="spinner"></div>';
      const fd = new FormData();
      fd.append("file", chosen);
      try {
        const res = await fetch("/predict", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) { renderError(data.detail || "prediction failed"); }
        else { render(data); }
      } catch (e) {
        renderError(e.message);
      } finally {
        goBtn.disabled = false;
      }
    });

    function render(d) {
      const conf = (d.confidence * 100).toFixed(1);
      const label = d.uncertain ? "uncertain" : d.best_guess;
      const top = d.top_k[0]?.genre;
      const rows = d.top_k.map(t => {
        const pct = (t.prob * 100).toFixed(1);
        const isTop = t.genre === top;
        return `<div class="bar-row ${isTop ? "top" : ""}">
                  <span class="name">${t.genre}</span>
                  <span class="bar-track"><span class="bar-fill" style="width:${pct}%"></span></span>
                  <span class="pct">${pct}%</span>
                </div>`;
      }).join("");
      output.innerHTML = `
        <div class="genre ${d.uncertain ? "uncertain" : ""}">${label}</div>
        <div class="confline">
          ${d.uncertain ? "low confidence · best guess <b>" + d.best_guess + "</b> · " : ""}
          ${conf}% confidence · ${d.n_windows} window${d.n_windows > 1 ? "s" : ""} averaged
        </div>
        <div class="bars">${rows}</div>`;
      // animate bars in
      requestAnimationFrame(() => {
        output.querySelectorAll(".bar-fill").forEach(b => {
          const w = b.style.width; b.style.width = "0"; requestAnimationFrame(() => b.style.width = w);
        });
      });
    }

    function renderError(msg) {
      output.innerHTML = `<div class="error">⚠️ ${msg}</div>`;
    }
  </script>
</body>
</html>
